name: Mirror to FleetONE

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  mirror:
    name: Mirror to FleetONE
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Mirror via API
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          # Get source commit SHA
          SOURCE_SHA=$(git rev-parse HEAD)
          echo "Source SHA: $SOURCE_SHA"

          # Push all objects to FleetONE using git
          git remote add fleetone https://x-access-token:${GH_TOKEN}@github.com/NCGHoldings/FleetONE.git

          # Push only the source code (exclude .github/workflows to avoid workflow scope issue)
          git filter-branch --force --index-filter \
            'git rm -r --cached --ignore-unmatch .github/workflows/' \
            --prune-empty HEAD

          git push fleetone main --force
