name: Mirror to FleetONE

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  mirror:
    name: Mirror to FleetONE
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}

      - name: Push to FleetONE
        run: |
          git remote add fleetone https://x-access-token:${{ secrets.GH_PAT }}@github.com/NCGHoldings/FleetONE.git
          git push fleetone main --force
