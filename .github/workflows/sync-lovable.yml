name: Sync to Lovable
on:
  workflow_dispatch:  # Allows manual trigger

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Golden Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to Lovable Server
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          git remote add lovable https://x-access-token:${GH_PAT}@github.com/NCGHoldings/ncg-fleetone-aff76110.git
          git push -f lovable main
