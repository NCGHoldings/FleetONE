name: Daily Database Backup (Supabase в†’ DO Spaces)
# Runs daily at 2:00 AM UTC. Can also be triggered manually.
# Secrets required: SUPABASE_DB_URL, DO_SPACES_KEY, DO_SPACES_SECRET, TELEGRAM_BOT_TOKEN, TELEGRAM_CHAT_ID

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - name: Install PostgreSQL Client
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y postgresql-client

      # в”Ђв”Ђ 1. Dump в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - name: Dump Supabase Database
        env:
          DATABASE_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          echo "рџ—„пёЏ  Starting pg_dump..."
          pg_dump "$DATABASE_URL" -Fc -Z 9 -f supabase-backup.dump
          DUMP_SIZE=$(du -sh supabase-backup.dump | cut -f1)
          echo "вњ… Dump complete. Size: $DUMP_SIZE"
          echo "DUMP_SIZE=$DUMP_SIZE" >> $GITHUB_ENV

      # в”Ђв”Ђ 2. Integrity Check в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - name: Verify Dump Integrity
        run: |
          echo "рџ”Ќ Verifying dump integrity with pg_restore --list..."
          pg_restore --list supabase-backup.dump > /tmp/restore-toc.txt
          TOC_LINES=$(wc -l < /tmp/restore-toc.txt)
          echo "   Table of Contents: $TOC_LINES entries"
          if [ "$TOC_LINES" -lt 10 ]; then
            echo "вќЊ Integrity check failed вЂ” TOC suspiciously small ($TOC_LINES lines)."
            exit 1
          fi
          echo "вњ… Integrity check passed."

      # в”Ђв”Ђ 3. Upload to DO Spaces в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - name: Upload to DigitalOcean Spaces
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.DO_SPACES_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.DO_SPACES_SECRET }}
          DO_SPACE_ENDPOINT: https://sgp1.digitaloceanspaces.com
          DO_SPACE_BUCKET: ncg-db-backup
        run: |
          TIMESTAMP=$(date +%Y-%m-%d_%H-%M)
          FILE_NAME="fleetone/supabase-backup-$TIMESTAMP.dump"
          echo "рџ“¤ Uploading $FILE_NAME to DigitalOcean Spaces..."
          aws s3 cp supabase-backup.dump "s3://$DO_SPACE_BUCKET/$FILE_NAME" \
            --endpoint-url "$DO_SPACE_ENDPOINT" \
            --acl private
          echo "вњ… Upload complete: $FILE_NAME"
          echo "BACKUP_FILE=$FILE_NAME" >> $GITHUB_ENV

      # в”Ђв”Ђ 4. Retention Purge (keep last 30 days) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - name: Purge Backups Older Than 30 Days
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.DO_SPACES_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.DO_SPACES_SECRET }}
          DO_SPACE_ENDPOINT: https://sgp1.digitaloceanspaces.com
          DO_SPACE_BUCKET: ncg-db-backup
        run: |
          echo "рџ§№ Purging backups older than 30 days..."
          CUTOFF=$(date -d '30 days ago' +%Y-%m-%d)

          aws s3 ls "s3://$DO_SPACE_BUCKET/fleetone/" \
            --endpoint-url "$DO_SPACE_ENDPOINT" | while read -r line; do
            FILE_DATE=$(echo "$line" | awk '{print $1}')
            FILE_NAME=$(echo "$line" | awk '{print $4}')
            if [[ "$FILE_DATE" < "$CUTOFF" ]] && [[ -n "$FILE_NAME" ]]; then
              echo "   Deleting old backup: $FILE_NAME (date: $FILE_DATE)"
              aws s3 rm "s3://$DO_SPACE_BUCKET/fleetone/$FILE_NAME" \
                --endpoint-url "$DO_SPACE_ENDPOINT"
            fi
          done
          echo "вњ… Retention purge complete."

      # в”Ђв”Ђ 5. Telegram вЂ” Success в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - name: Notify Telegram (Success)
        if: success()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          MESSAGE="вњ… *FleetONE DB Backup вЂ” Success*%0A%0Aрџ“¦ File: \`$BACKUP_FILE\`%0Aрџ“Џ Size: $DUMP_SIZE%0Aрџ•ђ Time: $(date -u '+%Y-%m-%d %H:%M UTC')%0A%0Aрџ”— [View Run]($RUN_URL)"
          curl -s -X POST "https://api.telegram.org/bot$TELEGRAM_BOT_TOKEN/sendMessage" \
            -d chat_id="$TELEGRAM_CHAT_ID" \
            -d parse_mode="Markdown" \
            -d text="$MESSAGE" > /dev/null

      # в”Ђв”Ђ 6. Telegram вЂ” Failure в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - name: Notify Telegram (Failure)
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          MESSAGE="рџљЁ *FleetONE DB Backup вЂ” FAILED*%0A%0Aвќ— The nightly database backup did not complete successfully.%0Aрџ•ђ Time: $(date -u '+%Y-%m-%d %H:%M UTC')%0A%0Aрџ”— [Investigate Run]($RUN_URL)"
          curl -s -X POST "https://api.telegram.org/bot$TELEGRAM_BOT_TOKEN/sendMessage" \
            -d chat_id="$TELEGRAM_CHAT_ID" \
            -d parse_mode="Markdown" \
            -d text="$MESSAGE" > /dev/null
