name: Daily Database Backup (Supabase → DO Spaces)
# Runs daily at 2:00 AM UTC. Can also be triggered manually.
# Secrets required: SUPABASE_DB_URL, DO_SPACES_KEY, DO_SPACES_SECRET, TELEGRAM_BOT_TOKEN, TELEGRAM_CHAT_ID

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - name: Install PostgreSQL Client
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y postgresql-client
      - name: Setup Cloudflare WARP (Provides IPv6)
        uses: fscarmen/warp-on-actions@v1.4

      - name: Whitelist Runner IP in Supabase
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          PROJECT_REF: wwjpdszkmtnzshbulkon
        run: |
          export RUNNER_IPV4=$(curl -s -4 https://api.ipify.org)
          export RUNNER_IPV6=$(curl -s -6 https://api64.ipify.org || echo "")
          echo "Runner IPv4 is $RUNNER_IPV4"
          echo "Runner IPv6 is $RUNNER_IPV6"
          
          node -e '
            (async () => {
              const getRes = await fetch(`https://api.supabase.com/v1/projects/${process.env.PROJECT_REF}/network-restrictions`, {
                headers: { "Authorization": `Bearer ${process.env.SUPABASE_ACCESS_TOKEN}` }
              });
              const data = await getRes.json();
              
              let existing = [];
              if (data.config && data.config.dbAllowedCidrs) existing = data.config.dbAllowedCidrs;
              else if (data.config && data.config.db_allowed_cidrs) existing = data.config.db_allowed_cidrs;
              else if (data.db_allowed_cidrs) existing = data.db_allowed_cidrs;
              else if (Array.isArray(data)) existing = data;
              
              require("fs").writeFileSync("original_cidrs.json", JSON.stringify(existing));
              
              const newIps = ["0.0.0.0/0", "::/0"];
              
              let modified = false;
              for (const ip of newIps) {
                if (!existing.includes(ip)) {
                  existing.push(ip);
                  modified = true;
                }
              }
              
              console.log("Updating allowlist to temporarily allow all IPs (0.0.0.0/0, ::/0) for the backup window...");
              const postRes = await fetch(`https://api.supabase.com/v1/projects/${process.env.PROJECT_REF}/network-restrictions/apply`, {
                method: "POST",
                headers: { 
                  "Authorization": `Bearer ${process.env.SUPABASE_ACCESS_TOKEN}`,
                  "Content-Type": "application/json"
                },
                body: JSON.stringify({ db_allowed_cidrs: existing })
              });
              
              if (!postRes.ok) {
                console.error(await postRes.text());
                process.exit(1);
              }
            })();
          '
          
          # Wait 20 seconds for firewall rules to propagate
          echo "Waiting 20 seconds for firewall rules to propagate..."
          sleep 20

      # ── 1. Dump ─────────────────────────────────────────────────────────────
      - name: Dump Supabase Database
        env:
          DATABASE_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          echo "🗄️  Starting pg_dump..."
          
          # Use Node.js to reliably parse and manipulate the connection string
          DIRECT_URL=$(node -e '
            const url = new URL(process.env.DATABASE_URL);
            
            // Format connection for Supavisor pooler compatibility
            if (url.hostname.includes("pooler.supabase")) {
              url.port = "5432"; // Session mode required for pg_dump
              
              // Extract tenant ID from username (postgres.tenant_id)
              const usernameParts = url.username.split(".");
              if (usernameParts.length > 1) {
                const projectRef = usernameParts.pop();
                url.username = usernameParts.join("."); // Reset to just "postgres"
                
                // Add reference as connection option (required by new Supavisor update)
                url.searchParams.append("options", `reference=${projectRef}`);
              }
            }
            
            url.searchParams.delete("pgbouncer");
            
            // Debug logging (password hidden)
            console.error(`[DEBUG] Host: ${url.hostname}`);
            console.error(`[DEBUG] Username: ${url.username}`);
            console.error(`[DEBUG] Port: ${url.port}`);
            console.error(`[DEBUG] Options: ${url.searchParams.get("options")}`);
            
            console.log(url.toString());
          ')
          
          # Use a timeout to prevent hanging forever if something goes wrong
          timeout 5m pg_dump "$DIRECT_URL" -Fc -Z 9 -f supabase-backup.dump
          DUMP_SIZE=$(du -sh supabase-backup.dump | cut -f1)
          echo "✅ Dump complete. Size: $DUMP_SIZE"
          echo "DUMP_SIZE=$DUMP_SIZE" >> $GITHUB_ENV

      # ── 2. Integrity Check ───────────────────────────────────────────────────
      - name: Verify Dump Integrity
        run: |
          echo "🔍 Verifying dump integrity with pg_restore --list..."
          pg_restore --list supabase-backup.dump > /tmp/restore-toc.txt
          TOC_LINES=$(wc -l < /tmp/restore-toc.txt)
          echo "   Table of Contents: $TOC_LINES entries"
          if [ "$TOC_LINES" -lt 10 ]; then
            echo "❌ Integrity check failed — TOC suspiciously small ($TOC_LINES lines)."
            exit 1
          fi
          echo "✅ Integrity check passed."

      # ── 3. Upload to DO Spaces ───────────────────────────────────────────────
      - name: Upload to DigitalOcean Spaces
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.DO_SPACES_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.DO_SPACES_SECRET }}
          DO_SPACE_ENDPOINT: https://sgp1.digitaloceanspaces.com
          DO_SPACE_BUCKET: ncg-db-backup
        run: |
          TIMESTAMP=$(date +%Y-%m-%d_%H-%M)
          FILE_NAME="fleetone/supabase-backup-$TIMESTAMP.dump"
          echo "📤 Uploading $FILE_NAME to DigitalOcean Spaces..."
          aws s3 cp supabase-backup.dump "s3://$DO_SPACE_BUCKET/$FILE_NAME" \
            --endpoint-url "$DO_SPACE_ENDPOINT" \
            --acl private
          echo "✅ Upload complete: $FILE_NAME"
          echo "BACKUP_FILE=$FILE_NAME" >> $GITHUB_ENV

      # ── 4. Retention Purge (keep last 30 days) ───────────────────────────────
      - name: Purge Backups Older Than 30 Days
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.DO_SPACES_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.DO_SPACES_SECRET }}
          DO_SPACE_ENDPOINT: https://sgp1.digitaloceanspaces.com
          DO_SPACE_BUCKET: ncg-db-backup
        run: |
          echo "🧹 Purging backups older than 30 days..."
          CUTOFF=$(date -d '30 days ago' +%Y-%m-%d)

          aws s3 ls "s3://$DO_SPACE_BUCKET/fleetone/" \
            --endpoint-url "$DO_SPACE_ENDPOINT" | while read -r line; do
            FILE_DATE=$(echo "$line" | awk '{print $1}')
            FILE_NAME=$(echo "$line" | awk '{print $4}')
            if [[ "$FILE_DATE" < "$CUTOFF" ]] && [[ -n "$FILE_NAME" ]]; then
              echo "   Deleting old backup: $FILE_NAME (date: $FILE_DATE)"
              aws s3 rm "s3://$DO_SPACE_BUCKET/fleetone/$FILE_NAME" \
                --endpoint-url "$DO_SPACE_ENDPOINT"
            fi
          done
          echo "✅ Retention purge complete."

      # ── 5. Telegram — Success ────────────────────────────────────────────────
      - name: Notify Telegram (Success)
        if: success()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          MESSAGE="✅ *FleetONE DB Backup — Success*%0A%0A📦 File: \`$BACKUP_FILE\`%0A📏 Size: $DUMP_SIZE%0A🕐 Time: $(date -u '+%Y-%m-%d %H:%M UTC')%0A%0A🔗 [View Run]($RUN_URL)"
          curl -s -X POST "https://api.telegram.org/bot$TELEGRAM_BOT_TOKEN/sendMessage" \
            -d chat_id="$TELEGRAM_CHAT_ID" \
            -d parse_mode="Markdown" \
            -d text="$MESSAGE" > /dev/null

      # ── 6. Telegram — Failure ────────────────────────────────────────────────
      - name: Notify Telegram (Failure)
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          MESSAGE="🚨 *FleetONE DB Backup — FAILED*%0A%0A❗ The nightly database backup did not complete successfully.%0A🕐 Time: $(date -u '+%Y-%m-%d %H:%M UTC')%0A%0A🔗 [Investigate Run]($RUN_URL)"
          curl -s -X POST "https://api.telegram.org/bot$TELEGRAM_BOT_TOKEN/sendMessage" \
            -d chat_id="$TELEGRAM_CHAT_ID" \
            -d parse_mode="Markdown" \
            -d text="$MESSAGE" > /dev/null

      # ── 7. Revert Network Restrictions ───────────────────────────────────────
      - name: Revert Supabase Network Restrictions
        if: always()
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          PROJECT_REF: wwjpdszkmtnzshbulkon
        run: |
          node -e '
            const fs = require("fs");
            if (!fs.existsSync("original_cidrs.json")) {
              console.log("No original CIDRs found. Skipping revert.");
              process.exit(0);
            }
            const original = JSON.parse(fs.readFileSync("original_cidrs.json", "utf8"));
            
            (async () => {
              console.log("Reverting allowlist to:", original);
              const postRes = await fetch(`https://api.supabase.com/v1/projects/${process.env.PROJECT_REF}/network-restrictions/apply`, {
                method: "POST",
                headers: { 
                  "Authorization": `Bearer ${process.env.SUPABASE_ACCESS_TOKEN}`,
                  "Content-Type": "application/json"
                },
                body: JSON.stringify({ db_allowed_cidrs: original })
              });
              
              if (!postRes.ok) {
                console.error("Failed to revert restrictions:", await postRes.text());
                process.exit(1);
              }
              console.log("Revert successful.");
            })();
          '
