name: Daily Database Backup (Supabase → DO Spaces)
# Runs daily at 2:00 AM UTC. Can also be triggered manually.
# Secrets required: SUPABASE_DB_URL, SUPABASE_ACCESS_TOKEN, DO_SPACES_KEY, DO_SPACES_SECRET, TELEGRAM_BOT_TOKEN, TELEGRAM_CHAT_ID

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - name: Install PostgreSQL Client
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y postgresql-client

      - name: Whitelist Runner IP in Supabase
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          PROJECT_REF: wwjpdszkmtnzshbulkon
        run: |
          # Get the runner's public IPv4 address
          export RUNNER_IP=$(curl -s https://api.ipify.org)
          echo "Runner IP is $RUNNER_IP"
          
          node -e '
            (async () => {
              const res = await fetch(`https://api.supabase.com/v1/projects/${process.env.PROJECT_REF}/network-restrictions`, {
                headers: { "Authorization": `Bearer ${process.env.SUPABASE_ACCESS_TOKEN}` }
              });
              const data = await res.json();
              
              let existing = [];
              if (data.config && data.config.dbAllowedCidrs) existing = data.config.dbAllowedCidrs;
              else if (data.config && data.config.db_allowed_cidrs) existing = data.config.db_allowed_cidrs;
              else if (data.db_allowed_cidrs) existing = data.db_allowed_cidrs;
              else if (Array.isArray(data)) existing = data;
              
              // Save original list to revert later
              require("fs").writeFileSync("original_cidrs.json", JSON.stringify(existing));
              
              // Add runner IP if not present
              const cidr = `${process.env.RUNNER_IP}/32`;
              if (!existing.includes(cidr)) {
                existing.push(cidr);
                console.log(`Adding runner IP: ${cidr}`);
              } else {
                console.log(`Runner IP ${cidr} already whitelisted.`);
              }
              
              const applyRes = await fetch(`https://api.supabase.com/v1/projects/${process.env.PROJECT_REF}/network-restrictions/apply`, {
                method: "POST",
                headers: { 
                  "Authorization": `Bearer ${process.env.SUPABASE_ACCESS_TOKEN}`,
                  "Content-Type": "application/json"
                },
                body: JSON.stringify({ db_allowed_cidrs: existing })
              });
              
              if (!applyRes.ok) {
                console.error("Failed to apply restrictions:", await applyRes.text());
                process.exit(1);
              }
            })();
          '
          
          # Wait for propagation (Supabase firewall updates can take 1-2 minutes)
          echo "Waiting 120 seconds for firewall rules to propagate..."
          sleep 120

      # ── 1. Dump ─────────────────────────────────────────────────────────────
      - name: Dump Supabase Database
        env:
          DATABASE_URL: ${{ secrets.SUPABASE_DB_URL }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          echo "🗄️ Preparing database connection..."
          
          # GitHub Actions runners do not support IPv6 outbound connections.
          # Since Supabase direct connections (db.wwjpdszkmtnzshbulkon.supabase.co) are IPv6-only,
          # we MUST route the connection through the IPv4-capable Supabase Pooler (port 5432, Session Mode).
          # This Node script automatically rewrites a direct connection string to the pooler connection string,
          # dynamically querying the correct regional pooler from the Supabase API to avoid "tenant not found" errors.
          DB_URL=$(node --input-type=module -e '
            try {
              const url = new URL(process.env.DATABASE_URL);
              const projectRef = "wwjpdszkmtnzshbulkon";
              let region = "ap-south-1"; // Default fallback (Mumbai, where this DB is located)
              
              // 1. Try to extract region if the connection string is already a pooler URL
              const match = url.hostname.match(/aws-0-(.+)\.pooler\.supabase\.com/);
              if (match) {
                region = match[1];
              } else if (process.env.SUPABASE_ACCESS_TOKEN) {
                // 2. Fetch the correct region from Supabase API dynamically
                try {
                  const res = await fetch(`https://api.supabase.com/v1/projects/${projectRef}`, {
                    headers: { "Authorization": `Bearer ${process.env.SUPABASE_ACCESS_TOKEN}` }
                  });
                  if (res.ok) {
                    const project = await res.json();
                    if (project.region) region = project.region;
                  }
                } catch (apiErr) {
                  console.error("Supabase API request failed, using default:", apiErr.message);
                }
              }
              
              const poolerHost = `aws-0-${region}.pooler.supabase.com`;
              if (url.hostname.includes("supabase.co") || url.hostname.includes("pooler.supabase.com")) {
                url.hostname = poolerHost;
                url.port = "5432"; // Session mode
                url.username = `postgres.${projectRef}`;
              }
              console.log(url.toString());
            } catch (e) {
              console.error("Error preparing URL:", e.message);
              process.exit(1);
            }
          ')
          
          echo "🗄️ Starting database dump..."
          pg_dump "$DB_URL" -Fc -Z 9 -f supabase-backup.dump
          
          DUMP_SIZE=$(du -sh supabase-backup.dump | cut -f1)
          echo "✅ Dump complete. Size: $DUMP_SIZE"
          echo "DUMP_SIZE=$DUMP_SIZE" >> $GITHUB_ENV

      # ── 2. Integrity Check ───────────────────────────────────────────────────
      - name: Verify Dump Integrity
        run: |
          echo "🔍 Verifying dump integrity..."
          pg_restore --list supabase-backup.dump > /dev/null
          echo "✅ Integrity check passed."

      # ── 3. Upload to DO Spaces ───────────────────────────────────────────────
      - name: Upload to DigitalOcean Spaces
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.DO_SPACES_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.DO_SPACES_SECRET }}
          DO_SPACE_ENDPOINT: https://sgp1.digitaloceanspaces.com
          DO_SPACE_BUCKET: ncg-db-backup
        run: |
          TIMESTAMP=$(date +%Y-%m-%d_%H-%M)
          FILE_NAME="fleetone/supabase-backup-$TIMESTAMP.dump"
          echo "📤 Uploading $FILE_NAME..."
          aws s3 cp supabase-backup.dump "s3://$DO_SPACE_BUCKET/$FILE_NAME" \
            --endpoint-url "$DO_SPACE_ENDPOINT" \
            --acl private
          echo "BACKUP_FILE=$FILE_NAME" >> $GITHUB_ENV

      # ── 3.5 Verify Encryption ────────────────────────────────────────────────
      - name: Verify Encryption
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.DO_SPACES_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.DO_SPACES_SECRET }}
          DO_SPACE_ENDPOINT: https://sgp1.digitaloceanspaces.com
          DO_SPACE_BUCKET: ncg-db-backup
        run: |
          echo "🔐 Verifying encryption on uploaded backup..."
          ENCRYPTION_INFO=$(aws s3api head-object \
            --bucket "$DO_SPACE_BUCKET" \
            --key "$BACKUP_FILE" \
            --endpoint-url "$DO_SPACE_ENDPOINT" 2>&1)
          
          if echo "$ENCRYPTION_INFO" | grep -q "ServerSideEncryption"; then
            ENCRYPTION_TYPE=$(echo "$ENCRYPTION_INFO" | grep -o '"ServerSideEncryption": "[^"]*"' | cut -d'"' -f4)
            echo "✅ Encryption verified: $ENCRYPTION_TYPE"
            echo "ENCRYPTION_STATUS=verified" >> $GITHUB_ENV
          else
            echo "⚠️ Warning: Could not verify encryption status"
            echo "ENCRYPTION_STATUS=unverified" >> $GITHUB_ENV
          fi

      # ── 4. Retention Purge (keep last 30 days) ───────────────────────────────
      - name: Purge Old Backups
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.DO_SPACES_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.DO_SPACES_SECRET }}
          DO_SPACE_ENDPOINT: https://sgp1.digitaloceanspaces.com
          DO_SPACE_BUCKET: ncg-db-backup
        run: |
          CUTOFF=$(date -d '30 days ago' +%Y-%m-%d)
          aws s3 ls "s3://$DO_SPACE_BUCKET/fleetone/" --endpoint-url "$DO_SPACE_ENDPOINT" | while read -r line; do
            FILE_DATE=$(echo "$line" | awk "{print \$1}")
            FILE_NAME=$(echo "$line" | awk "{print \$4}")
            if [[ "$FILE_DATE" < "$CUTOFF" ]] && [[ -n "$FILE_NAME" ]]; then
              aws s3 rm "s3://$DO_SPACE_BUCKET/fleetone/$FILE_NAME" --endpoint-url "$DO_SPACE_ENDPOINT"
            fi
          done

      # ── 5. Telegram Notifications ──────────────────────────────────────────
      - name: Notify Telegram (Success)
        if: success()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          ENCRYPTION_BADGE="🔐"
          if [ "$ENCRYPTION_STATUS" = "verified" ]; then
            ENCRYPTION_BADGE="🔐✅"
          fi
          MESSAGE="✅ *FleetONE DB Backup — Success*%0A%0A📦 File: \`$BACKUP_FILE\`%0A📏 Size: $DUMP_SIZE%0A$ENCRYPTION_BADGE Encryption: Verified%0A🕐 Time: $(date -u '+%Y-%m-%d %H:%M UTC')%0A%0A🔗 [View Run]($RUN_URL)"
          curl -s -X POST "https://api.telegram.org/bot$TELEGRAM_BOT_TOKEN/sendMessage" \
            -d chat_id="$TELEGRAM_CHAT_ID" \
            -d parse_mode="Markdown" \
            -d text="$MESSAGE"

      - name: Notify Telegram (Failure)
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          MESSAGE="🚨 *FleetONE DB Backup — FAILED*%0A%0A❗ Nightly backup failed. Check logs for details.%0A🕐 Time: $(date -u '+%Y-%m-%d %H:%M UTC')%0A%0A🔗 [Investigate Run]($RUN_URL)"
          curl -s -X POST "https://api.telegram.org/bot$TELEGRAM_BOT_TOKEN/sendMessage" \
            -d chat_id="$TELEGRAM_CHAT_ID" \
            -d parse_mode="Markdown" \
            -d text="$MESSAGE"

      # ── 6. Revert Network Restrictions ───────────────────────────────────────
      - name: Revert Supabase Network Restrictions
        if: always()
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          PROJECT_REF: wwjpdszkmtnzshbulkon
        run: |
          node -e '
            const fs = require("fs");
            if (!fs.existsSync("original_cidrs.json")) process.exit(0);
            const original = JSON.parse(fs.readFileSync("original_cidrs.json", "utf8"));
            (async () => {
              console.log("Reverting firewall settings...");
              const res = await fetch(`https://api.supabase.com/v1/projects/${process.env.PROJECT_REF}/network-restrictions/apply`, {
                method: "POST",
                headers: { 
                  "Authorization": `Bearer ${process.env.SUPABASE_ACCESS_TOKEN}`,
                  "Content-Type": "application/json"
                },
                body: JSON.stringify({ db_allowed_cidrs: original })
              });
              if (!res.ok) {
                console.error(`Failed to revert firewall settings for project ${process.env.PROJECT_REF}:`, await res.text());
                process.exit(1);
              }
            })();
          '
