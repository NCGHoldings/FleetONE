name: Deploy Bug Listener

on:
  # Run once manually to install, or after changes to the listener script
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "scripts/bug-listener.mjs"
      - "scripts/bug-listener.ecosystem.config.cjs"
      - ".github/workflows/deploy-bug-listener.yml"

jobs:
  deploy:
    name: Deploy bug listener to VPS
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Deploy and restart via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:        ${{ secrets.VPS_HOST }}
          username:    root
          key:         ${{ secrets.VPS_SSH_KEY }}
          envs:        GH_PAT,SLACK_APP_TOKEN,SLACK_BOT_TOKEN,ANTHROPIC_API_KEY
          script: |
            set -e

            REPO_DIR=/var/www/fleetone/bug-listener
            REPO_URL="https://x-access-token:$GH_PAT@github.com/NCGHoldings/FleetONE.git"

            # Clone repo if not present, otherwise pull latest
            if [ -d "$REPO_DIR/.git" ]; then
              echo "Pulling latest code…"
              cd $REPO_DIR
              git remote set-url origin "$REPO_URL"
              git fetch origin main
              git reset --hard origin/main
            else
              echo "Cloning repo (removing any stale dir first)…"
              rm -rf $REPO_DIR
              git clone "$REPO_URL" $REPO_DIR
              cd $REPO_DIR
            fi

            # Write secrets to env file
            cat > /etc/fleetone-bug-listener.env << ENVEOF
            SLACK_APP_TOKEN=$SLACK_APP_TOKEN
            SLACK_BOT_TOKEN=$SLACK_BOT_TOKEN
            ANTHROPIC_API_KEY=$ANTHROPIC_API_KEY
            GITHUB_REPO=NCGHoldings/FleetONE
            REPO_ROOT=$REPO_DIR
            SLACK_CHANNEL_ID=C0B2XT7EN90
            BUG_BOT_USER_ID=U0B2ZP9PGM7
            ENVEOF
            chmod 600 /etc/fleetone-bug-listener.env

            # Load secrets into current shell for pm2
            set -a; source /etc/fleetone-bug-listener.env; set +a

            # Ensure Node/npm in PATH (handles nvm and system installs)
            export PATH="$PATH:/usr/local/bin:/usr/bin:$HOME/.nvm/versions/node/$(ls $HOME/.nvm/versions/node 2>/dev/null | tail -1)/bin"
            NODE_BIN=$(which node 2>/dev/null || find /usr/local/bin /usr/bin $HOME/.nvm -name node -type f 2>/dev/null | head -1)
            NPM_BIN=$(which npm 2>/dev/null || find /usr/local/bin /usr/bin $HOME/.nvm -name npm -type f 2>/dev/null | head -1)
            echo "Node: $NODE_BIN  Npm: $NPM_BIN"

            # Install pm2 + start/restart listener
            $NPM_BIN install -g pm2 --silent
            PM2_BIN=$(which pm2 2>/dev/null || find /usr/local/bin /usr/bin -name pm2 -type f 2>/dev/null | head -1)
            cd $REPO_DIR

            if $PM2_BIN describe fleetone-bug-listener > /dev/null 2>&1; then
              $PM2_BIN restart fleetone-bug-listener --update-env
            else
              $PM2_BIN start scripts/bug-listener.ecosystem.config.cjs --update-env
            fi

            $PM2_BIN save
            $PM2_BIN status fleetone-bug-listener
