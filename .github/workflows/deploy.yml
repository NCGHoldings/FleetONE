name: Deploy to VPS

on:
  push:
    branches: [main]
  repository_dispatch:
    types: [mirror_sync]
  workflow_dispatch:

env:
  NODE_VERSION: "20"

jobs:
  # CI checks must pass before deploying
  ci:
    name: CI Checks
    uses: ./.github/workflows/ci.yml

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: ci
    environment: production
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: GH_TOKEN
          script: |
            set -e
            APP_DIR="${{ secrets.VPS_APP_DIR }}"

            echo "📦 Navigating to app directory..."
            cd "$APP_DIR"

            # Fix git ownership check
            git config --global --add safe.directory "$APP_DIR"

            # Pull from source repo (ncg-fleetflow)
            REPO_URL="https://${GH_TOKEN}@github.com/NCGHoldings/ncg-fleetflow.git"

            if [ ! -d ".git" ]; then
              echo "🔧 Initializing git repo..."
              git init -b main
              git remote add origin "$REPO_URL"
            else
              git remote set-url origin "$REPO_URL" 2>/dev/null || git remote add origin "$REPO_URL"
            fi

            echo "⬇️ Pulling latest changes..."
            git fetch origin main
            git reset --hard origin/main

            echo "🐳 Rebuilding Docker container..."
            docker build -t fleetflow .
            docker rm -f fleetflow || true
            docker run -d --restart always -p 3000:3000 --name fleetflow fleetflow

            echo "✅ Deployment complete!"
