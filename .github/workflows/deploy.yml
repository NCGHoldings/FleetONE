name: Deploy to VPS

on:
  # Manual trigger only — click "Run workflow" in GitHub Actions
  workflow_dispatch:

env:
  NODE_VERSION: "20"

jobs:
  # CI checks must pass before deploying
  ci:
    name: CI Checks
    uses: ./.github/workflows/ci.yml

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: ci
    environment: production
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        env:
          GH_PAT: ${{ secrets.GITHUB_TOKEN }}
          APP_DIR: ${{ secrets.VPS_APP_DIR }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: GH_PAT,APP_DIR
          script: |
            set -e

            echo "📦 Navigating to app directory..."
            cd "$APP_DIR"

            echo "🧹 Cleaning untracked files..."
            git clean -fd

            echo "🔑 Setting up authenticated git remote..."
            git remote set-url origin "https://${GH_PAT}@github.com/NCGHoldings/FleetONE.git"

            echo "⬇️ Pulling latest changes..."
            git fetch origin main
            git reset --hard origin/main

            echo "📥 Installing dependencies..."
            npm install --legacy-peer-deps

            echo "🔨 Building application..."
            export NODE_OPTIONS="--max-old-space-size=4096"
            npm run build

            echo "🔄 Reloading Nginx..."
            sudo systemctl reload nginx

            echo "✅ Deployment complete!"
