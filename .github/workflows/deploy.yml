name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  NODE_VERSION: "20"

jobs:
  # CI checks must pass before deploying
  ci:
    name: CI Checks
    uses: ./.github/workflows/ci.yml

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: ci
    environment: production
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            APP_DIR="${{ secrets.VPS_APP_DIR }}"

            echo "📦 Navigating to app directory..."
            cd "$APP_DIR"

            # Fix git ownership check
            git config --global --add safe.directory "$APP_DIR"

            # Initialize git if not already a repo
            if [ ! -d ".git" ]; then
              echo "🔧 Initializing git repo..."
              git init -b main
              git remote add origin https://github.com/NCGHoldings/FleetONE.git
            fi

            echo "⬇️ Pulling latest changes..."
            git fetch origin main
            git reset --hard origin/main

            echo "� Rebuilding Docker container..."
            docker build -t fleetflow .
            docker rm -f fleetflow || true
            docker run -d --restart always -p 3000:3000 --name fleetflow fleetflow

            echo "✅ Deployment complete!"
