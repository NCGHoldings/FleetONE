name: Jules Nightly Stabilization Pass

on:
  schedule:
    # Run at midnight Sri Lanka Time (IST, UTC+5:30) -> 18:30 UTC
    - cron: '30 18 * * *'
  workflow_dispatch: # Enable manual triggering from GitHub UI

jobs:
  nightly-maintenance:
    name: Execute Jules Nightly Workflow
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Read Jules Prompt
        id: jules_prompt
        run: |
          {
            echo 'prompt<<EOF'
            cat .agent/jules-prompt.txt
            echo EOF
          } >> "$GITHUB_OUTPUT"

      - uses: google-labs-code/jules-action@v1.0.0
        with:
          # Get your Jules API key from jules.google.com → Settings → API Keys
          # Add it to GitHub Repo Secrets as JULES_API_KEY (NOT GEMINI_API_KEY)
          jules_api_key: ${{ secrets.JULES_API_KEY }}
          starting_branch: main
          include_last_commit: true
          include_commit_log: true
          prompt: ${{ steps.jules_prompt.outputs.prompt }}
