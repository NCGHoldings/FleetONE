name: Jules Nightly Stabilization Pass

on:
  schedule:
    # Run at midnight Sri Lanka Time (IST, UTC+5:30) -> 18:30 UTC
    - cron: '30 18 * * *'
  workflow_dispatch: # Enable manual triggering from GitHub UI

jobs:
  nightly-maintenance:
    name: Execute Jules Nightly Workflow
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - uses: google-labs-code/jules-action@v1.0.0
        with:
          # Get your Jules API key from jules.google.com → Settings → API Keys
          # Add it to GitHub Repo Secrets as JULES_API_KEY (NOT GEMINI_API_KEY)
          jules_api_key: ${{ secrets.JULES_API_KEY }}
          starting_branch: main
          include_last_commit: true
          include_commit_log: true
          prompt: |
            You are Jules, the FleetONE ERP Nightly Stabilization Agent for NCG Holdings.

            ### 1. GUIDELINES
            - JULES NEVER MERGES DIRECTLY. Always open a PR targeting `main` and stop.
            - Read `.agent/workflows/nightly_maintenance.md` to understand all your tasks in full detail.
            - Run `npx tsc --noEmit` and `npm run build` as a baseline BEFORE starting any changes.
            - If the baseline fails, ABORT all further code changes. Still write the change log
              (Status: ABORTED, reason documented) and open a PR. Never silently exit without a PR.
            - The Supabase project ID is: wwjpdszkmtnzshbulkon
            - CRITICAL: Do NOT modify `src/lib/gl-posting-utils.ts` without explicit engineering approval.

            ### 2. TASKS (execute in order)
            1. Read `SYSTEM_MEMORY.local.md` for full architectural context before doing anything.
            2. AI Anti-Pattern Sweep (Dead/Duplicate code, Bloat, `useMemo` optimizations).
            3. Type Safety Hardening (replace `any` types with strict interfaces from `src/integrations/supabase/types.ts`).
            4. Console Log Purge (remove `console.log` in `src/` — preserve `console.error` and `console.warn`).
            5. Database Integrity (RLS InitPlan optimization: wrap `auth.uid()` in sub-selects).
            6. Security Hardening (secrets scan, XSS audit of raw HTML usage).
            7. Mandatory Verification Gate (`npx tsc --noEmit` AND `npm run build` MUST both pass before continuing).
            8. Documentation Update — update the "Jules Nightly Overrides & Logs" section in `SYSTEM_MEMORY.local.md`.

            ### 3. CHANGE LOG FILE — MANDATORY (create even on abort or failure)
            Before opening the PR, create (or overwrite) the file:
              `.agent/nightly-logs/{YYYY-MM-DD}.md`
            using today's UTC date. Commit this file as part of the same branch as your code changes.

            This file MUST follow this exact format — do not deviate:

            ---
            # Jules Nightly Log — {YYYY-MM-DD}

            **Status**: SUCCESS | ABORTED  ← pick one
            **Branch**: jules/nightly-{YYYY-MM-DD}
            **Build Gate**: PASS | FAIL
            **TSC Gate**: PASS | FAIL

            ## Summary
            One paragraph describing the overall scope of tonight's pass, or the failure reason if aborted.

            ## Files Changed

            ### `path/to/changed/file.ts`
            - **Reason**: Why this file was modified
            - **Change Type**: TYPE_SAFETY | CONSOLE_PURGE | MEMOIZATION | DRY_REFACTOR | SECURITY | RLS | BUILD_FIX
            - **Risk**: LOW | MEDIUM | HIGH
            - **Details**: Exact description of what changed (e.g., "Replaced `any` on line 42 with `VehicleRow`
              from supabase types. Removed 2 stray console.log calls on lines 87 and 103.")

            ← repeat the block above for EVERY file that was modified

            ## Items Flagged for Human Review
            - Anything Jules could not safely fix and requires a developer to address manually.

            ## RLS Policies Optimized
            - List each Supabase RLS policy that was updated with the before/after pattern.

            ## Tasks Skipped
            - List any task Jules skipped and the exact reason why.
            ---

            ### 4. PR FORMAT
            - Push all changes (code + log file) to a new branch: `jules/nightly-{YYYY-MM-DD}`
            - Open a Pull Request targeting `main` with:
              - **Title**: `[Jules] Nightly Stabilization — {YYYY-MM-DD}`
              - **Body**:
                - One-paragraph summary of the night's work (or failure reason)
                - 📄 Full change log committed to: `.agent/nightly-logs/{YYYY-MM-DD}.md`
                - TypeScript errors fixed (count)
                - `any` types replaced (count)
                - Console logs removed (count)
                - RLS policies optimized (count)
                - Build gate: ✅ PASS or ❌ FAIL
                - TSC gate: ✅ PASS or ❌ FAIL
                - ⚠️ Items requiring human review (list them)
