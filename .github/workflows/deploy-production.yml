name: Deploy to Production
# ⚠️  This workflow ONLY fires on push to 'deploy/live' branch or manual dispatch.
# To deploy to production: git push origin main:deploy/live
# Production URL: https://fleetone.ncg.lk

on:
  push:
    branches:
      - "deploy/live"
  workflow_dispatch:

env:
  # Reuses the same VPS secrets already configured in the repository secrets
  PRIMARY_IP: ${{ secrets.VPS_HOST }}
  APP_DIR: ${{ secrets.VPS_APP_DIR }}

jobs:
  # ── Quality Gate (must pass before deploy) ──────────────────────────────────
  quality-gate:
    name: Quality Gate
    uses: ./.github/workflows/ci-check.yml

  deploy:
    runs-on: ubuntu-latest
    needs: [quality-gate]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install Dependencies & Build Source
        env:
          VITE_APP_ENV: production
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
        run: |
          npm ci --legacy-peer-deps
          NODE_OPTIONS="--max-old-space-size=6144" npm run build

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Generate Common Release Timestamp
        id: timestamp
        run: echo "DIR=20$(date +'%y%m%d%H%M%S')" >> $GITHUB_OUTPUT

      - name: Deploy to Production Server (Zero-Downtime)
        env:
          RELEASE_DIR: ${{ steps.timestamp.outputs.DIR }}
        run: |
          echo "🚀 Starting deployment to PRODUCTION (${{ env.PRIMARY_IP }})..."
          TARGET_PATH="${{ env.APP_DIR }}/releases/production/$RELEASE_DIR"
          SYMLINK_PATH="${{ env.APP_DIR }}/FleetONE"

          echo "📂 Creating new release directory: $TARGET_PATH"
          ssh -o StrictHostKeyChecking=no root@${{ env.PRIMARY_IP }} "mkdir -p $TARGET_PATH"

          echo "📦 Syncing compiled source code..."
          rsync -avz \
            dist/ root@${{ env.PRIMARY_IP }}:$TARGET_PATH/dist/

          rsync -avz \
            package.json \
            -e "ssh -o StrictHostKeyChecking=no" \
            ./ root@${{ env.PRIMARY_IP }}:$TARGET_PATH/

          echo "📝 Creating .env file..."
          ssh -o StrictHostKeyChecking=no root@${{ env.PRIMARY_IP }} "cat > $TARGET_PATH/.env << 'EOF'
          VITE_APP_ENV=production
          VITE_SUPABASE_URL=${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY=${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          VITE_SUPABASE_ANON_KEY=${{ secrets.VITE_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          VITE_GEMINI_API_KEY=${{ secrets.VITE_GEMINI_API_KEY }}
          EOF
          chmod 600 $TARGET_PATH/.env"

          # ATOMIC SYMLINK PIVOT — zero downtime 🚀
          echo "🔄 Pivoting production traffic to new release..."
          ssh -o StrictHostKeyChecking=no root@${{ env.PRIMARY_IP }} \
            "rsync -a --delete $TARGET_PATH/dist/ $SYMLINK_PATH/dist/ && sudo systemctl reload nginx"
          echo "✅ Traffic is now live on release: $RELEASE_DIR"

          # Housekeeping: Keep last 5 releases
          echo "🧹 Cleaning up old releases (Keeping last 5)..."
          ssh -o StrictHostKeyChecking=no root@${{ env.PRIMARY_IP }} "cd ${{ env.APP_DIR }}/releases/production && ls -1t | tail -n +6 | xargs -I {} rm -rf {}"

      - name: Smoke Test & Health Check
        env:
          RELEASE_DIR: ${{ steps.timestamp.outputs.DIR }}
        run: |
          echo "🏥 Running post-deploy smoke test on Production..."
          PROD_URL="https://fleetone.ncg.lk"

          MAX_RETRIES=5
          RETRY_DELAY=15
          SUCCESS=false

          for i in $(seq 1 $MAX_RETRIES); do
            echo "  Attempt $i/$MAX_RETRIES — checking $PROD_URL ..."
            HTTP_STATUS=$(curl -o /tmp/prod_response.html -s -w "%{http_code}" -k --max-time 20 "$PROD_URL" || echo "000")

            if [ "$HTTP_STATUS" = "200" ]; then
              if grep -q '<div id="root">' /tmp/prod_response.html 2>/dev/null; then
                echo "  ✅ App shell confirmed — React root div found."
                SUCCESS=true
                break
              else
                echo "  ⚠️  HTTP 200 but app shell missing."
              fi
            else
              echo "  ⚠️  Got HTTP $HTTP_STATUS"
            fi

            if [ $i -lt $MAX_RETRIES ]; then
              echo "  Retrying in ${RETRY_DELAY}s..."
              sleep $RETRY_DELAY
            fi
          done

          if [ "$SUCCESS" != "true" ]; then
            echo "❌ Production health check failed after $MAX_RETRIES attempts."
            echo "🚨 Consider manually triggering a rollback!"
            exit 1
          fi

          # Report active release
          ACTIVE_RELEASE=$(ssh -o StrictHostKeyChecking=no root@${{ env.PRIMARY_IP }} \
            "ls -1t ${{ env.APP_DIR }}/releases/production/ | head -1" 2>/dev/null || echo "unknown")
          echo "🏷️  Active release on Production: $ACTIVE_RELEASE"
          echo "✅ Production smoke test passed!"
