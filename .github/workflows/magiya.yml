name: Run Magiya Scraper

on:
  schedule:
    # Run every day at 11:59 PM UTC
    - cron: '59 23 * * *'
  workflow_dispatch: # Allows you to run this manually from the GitHub UI right now!

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: |
          npm install --force --legacy-peer-deps
          # Install pdfjs-dist (Mozilla official PDF.js — works in Node 20 ESM)
          npm install pdfjs-dist --no-save --force

      - name: Run Scraper
        env:
          VITE_SUPABASE_URL: https://wwjpdszkmtnzshbulkon.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/magiya_scraper.js
