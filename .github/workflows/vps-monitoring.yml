name: VPS Health & Disk Monitoring
# Runs every 6 hours to monitor the production server health and disk space.
# Alerts via Telegram if disk usage exceeds 85%.

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Check Disk Space & Memory
        id: check
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
        run: |
          echo "🔍 Connecting to VPS ($VPS_HOST) to audit resources..."
          
          # Get root disk usage percentage
          DISK_USAGE=$(ssh -o StrictHostKeyChecking=no root@$VPS_HOST "df / | tail -1 | awk '{print \$5}' | sed 's/%//'")
          
          # Get free memory
          FREE_MEM=$(ssh -o StrictHostKeyChecking=no root@$VPS_HOST "free -m | grep Mem | awk '{print \$4}'")
          
          echo "📊 Disk Usage: $DISK_USAGE%"
          echo "📊 Free Memory: ${FREE_MEM}MB"
          
          echo "disk_usage=$DISK_USAGE" >> $GITHUB_OUTPUT
          echo "free_mem=$FREE_MEM" >> $GITHUB_OUTPUT

      - name: Notify Telegram on Alert
        if: steps.check.outputs.disk_usage > 0
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          MESSAGE="🚨 *FleetONE VPS Resource Alert*%0A%0A❗ *Critical Disk Usage*: ${{ steps.check.outputs.disk_usage }}%%0A📉 Free Memory: ${{ steps.check.outputs.free_mem }}MB%0A🕐 Time: $(date -u '+%Y-%m-%d %H:%M UTC')%0A%0AImmediate action required: SSH into the server and prune old logs or releases."
          curl -s -X POST "https://api.telegram.org/bot$TELEGRAM_BOT_TOKEN/sendMessage" \
            -d chat_id="$TELEGRAM_CHAT_ID" \
            -d parse_mode="Markdown" \
            -d text="$MESSAGE" > /dev/null

      - name: Log Health Check (Success)
        if: steps.check.outputs.disk_usage <= 85
        run: echo "✅ VPS health check passed. Disk usage at ${{ steps.check.outputs.disk_usage }}%."
